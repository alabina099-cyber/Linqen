title = "Gitleaks config — LinkedIn Agent"

[extend]
useDefault = true

[allowlist]
description = "Allowlist pour faux positifs connus"
regexes = [
  # Hashes intégrité npm/yarn (sha512-...)
  '''sha\d{1,3}-[A-Za-z0-9+/=]{40,}''',
  # Valeurs placeholder / exemples dans les docs
  '''(sk-|pk_|rk_)(test|demo|example|placeholder|your|xxxx|XXXX|dummy)''',
  # Variables d'env de type YOUR_KEY_HERE
  '''\bYOUR_[A-Z_]+_(KEY|SECRET|TOKEN|PASSWORD)\b''',
  # Expressions GitHub Actions (secrets.X)
  '''\$\{\{[^}]*secrets\.[^}]*\}\}''',
]
paths = [
  # Lock files (checksums npm/yarn)
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''pnpm-lock\.yaml''',
  # Fichiers de test (tokens factices)
  '''tests/.*''',
  '''.*\.test\.(ts|js|tsx)''',
  '''.*\.spec\.(ts|js|tsx)''',
  # Config, exemples et docs
  '''\.env\.example''',
  '''\.env\.local\.example''',
  '''README\.md''',
  '''docs/.*''',
  '''les rapports/.*''',
  '''diagrams/.*''',
]
