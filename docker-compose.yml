# =============================================
# Docker Compose — Horizontal Scaling Setup
# Nginx load balancer + N instances of Next.js app
# Usage: docker-compose up --scale app=3
# =============================================

services:
  # Load balancer (Nginx)
  nginx:
    image: nginx:1.27-alpine
    container_name: linkedin-agent-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - linkedin-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Next.js app — peut être scalé horizontalement
  # Usage: docker-compose up --scale app=N (où N = nombre d'instances)
  app:
    build:
      context: ./linkedin-agent-frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - linkedin-net
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # Worker LinkedIn Agent — exécute les actions via Puppeteer/Chrome headless
  # Peut être scalé : docker-compose up --scale worker=N
  worker:
    build:
      context: ./linkedin-agent-worker
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - WORKER_ID=${WORKER_ID:-worker-docker}
      - POLL_INTERVAL_MS=5000
      - HEADLESS=true
    restart: unless-stopped
    networks:
      - linkedin-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  linkedin-net:
    driver: bridge
