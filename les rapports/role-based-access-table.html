<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Role-Based Access Summary — Qlinqen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      padding: 40px 48px;
      max-width: 820px;
      width: 100%;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13.5px;
      color: #334155;
    }
    th {
      text-align: left;
      padding: 14px 16px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.4px;
      border-bottom: 2px solid #e2e8f0;
    }
    th:nth-child(2), th:nth-child(3) {
      text-align: center;
      width: 160px;
    }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      font-weight: 500;
    }
    td:nth-child(2), td:nth-child(3) {
      text-align: center;
    }
    tr:hover td {
      background: #f8fafc;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
    }
    .badge-granted {
      background: #ecfdf5;
      color: #059669;
      border: 1px solid #d1fae5;
    }
    .badge-granted-default {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #dbeafe;
    }
    .badge-denied {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fee2e2;
    }
    .check { font-size: 14px; }
    .cross { font-size: 14px; }
    .label-linkedin { color: #64748b; font-weight: 500; font-size: 12px; margin-left: 2px; }
    .label-credentials { color: #64748b; font-weight: 500; font-size: 12px; margin-left: 2px; }
    .label-default { color: #64748b; font-weight: 500; font-size: 12px; margin-left: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">4. Role-Based Access Summary</div>
    <table>
      <thead>
        <tr>
          <th>Interface / View</th>
          <th>Administrator</th>
          <th>Member</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Login page (dual-mode)</td>
          <td>
            <span class="badge badge-granted-default"><span class="check">&#10003;</span><span class="label-default">LinkedIn</span></span>
          </td>
          <td>
            <span class="badge badge-granted"><span class="check">&#10003;</span><span class="label-default">Credentials</span></span>
          </td>
        </tr>
        <tr>
          <td>BI Dashboard</td>
          <td>
            <span class="badge badge-granted-default"><span class="check">&#10003;</span><span class="label-default">default</span></span>
          </td>
          <td>
            <span class="badge badge-denied"><span class="cross">&#10005;</span></span>
          </td>
        </tr>
        <tr>
          <td>Prospects Pipeline</td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
        </tr>
        <tr>
          <td>Campaigns</td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
        </tr>
        <tr>
          <td>Approval Queue</td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
        </tr>
        <tr>
          <td>AI Agent</td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
          <td>
            <span class="badge badge-granted-default"><span class="check">&#10003;</span><span class="label-default">default</span></span>
          </td>
        </tr>
        <tr>
          <td>Settings (4 sub-tabs)</td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
        </tr>
        <tr>
          <td>User Management</td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
          <td><span class="badge badge-denied"><span class="cross">&#10005;</span></span></td>
        </tr>
        <tr>
          <td>Chrome Extension (popup)</td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
          <td><span class="badge badge-granted"><span class="check">&#10003;</span></span></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
