<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    .header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
    }

    .header-text p {
      font-size: 11px;
      opacity: 0.85;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .status-dot.processing { background: #f59e0b; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .content {
      padding: 16px 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: 700;
      color: #1e293b;
    }

    .stat-card .label {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .stat-card.pending .value { color: #3b82f6; }
    .stat-card.completed .value { color: #22c55e; }
    .stat-card.failed .value { color: #ef4444; }
    .stat-card.total .value { color: #8b5cf6; }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 8px;
    }

    .actions-list {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
      max-height: 200px;
      overflow-y: auto;
    }

    .action-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 12px;
    }

    .action-item:last-child { border-bottom: none; }

    .action-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .action-type.search { background: #dbeafe; color: #2563eb; }
    .action-type.visit_profile { background: #fef3c7; color: #d97706; }
    .action-type.send_connection { background: #dcfce7; color: #16a34a; }
    .action-type.send_message { background: #f3e8ff; color: #9333ea; }

    .action-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #334155;
    }

    .action-status {
      font-size: 10px;
      font-weight: 500;
    }

    .action-status.pending { color: #f59e0b; }
    .action-status.completed { color: #22c55e; }
    .action-status.failed { color: #ef4444; }
    .action-status.processing { color: #3b82f6; }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 12px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover { background: #2563eb; }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-secondary:hover { background: #e2e8f0; }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer {
      padding: 12px 20px;
      text-align: center;
      font-size: 10px;
      color: #94a3b8;
      border-top: 1px solid #e2e8f0;
    }

    .linkedin-account-bar {
      padding: 10px 20px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .account-info {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #334155;
    }

    .account-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
    }
    .account-dot.li-connected { background: #0a66c2; }
    .account-dot.li-disconnected { background: #ef4444; }

    .btn-linkedin {
      font-size: 10px;
      padding: 4px 10px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-linkedin:hover { background: #004182; }
    .btn-linkedin.disconnect {
      background: #fee2e2;
      color: #dc2626;
    }
    .btn-linkedin.disconnect:hover { background: #fecaca; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>LinkedIn Agent</h1>
      <p>Prospection automatique</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span style="font-size: 11px; color: #94a3b8; margin-right: 2px;">Serveur:</span>
      <span id="statusText">Vérification...</span>
    </div>
    <span id="processingText" style="font-size: 11px; color: #64748b;"></span>
  </div>

  <div class="linkedin-account-bar">
    <div class="account-info">
      <div class="account-dot li-disconnected" id="liAccountDot"></div>
      <span id="liAccountText">Compte LinkedIn non connecté</span>
    </div>
    <button class="btn-linkedin" id="liAccountBtn">Connecter</button>
  </div>

  <div class="content">
    <div class="stats-grid">
      <div class="stat-card pending">
        <div class="value" id="pendingCount">0</div>
        <div class="label">En attente</div>
      </div>
      <div class="stat-card completed">
        <div class="value" id="completedCount">0</div>
        <div class="label">Terminées</div>
      </div>
      <div class="stat-card failed">
        <div class="value" id="failedCount">0</div>
        <div class="label">Échouées</div>
      </div>
      <div class="stat-card total">
        <div class="value" id="totalCount">0</div>
        <div class="label">Total aujourd'hui</div>
      </div>
    </div>

    <div class="section-title">Actions récentes</div>
    <div class="actions-list" id="actionsList">
      <div class="empty-state">Aucune action en attente</div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="refreshBtn">Rafraîchir</button>
      <button class="btn btn-secondary" id="openDashboardBtn">Dashboard</button>
    </div>
  </div>

  <div class="footer">
    LinkedIn Agent v1.0 — Connecté à localhost:3000
  </div>

  <script src="popup.js"></script>
</body>
</html>
