name: CI - Lint, TypeCheck & Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'linkedin-agent-frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'linkedin-agent-frontend/**'

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check with tsc
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: linkedin-agent-frontend/coverage/
          retention-days: 7

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, unit-tests]
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-dummy' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'dummy_jwt_secret_for_build_only_min_32_characters_long_xx' }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'dummy_encryption_key_for_build_only_min_32_chars_xxxxxxxx' }}
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: linkedin-agent-frontend/.next/
          retention-days: 7

  final-verification:
    name: Final Verification
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, build]
    steps:
      - name: Verify all jobs passed
        run: |
          echo "## ✅ Final Verification — All jobs passed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint:** ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Type Check:** ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests:** ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ✅" >> $GITHUB_STEP_SUMMARY
