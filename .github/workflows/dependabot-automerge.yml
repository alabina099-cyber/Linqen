# run: final-verification-v2
name: Dependabot Auto-merge

on:
  pull_request_target:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-review:
    name: Review & Auto-merge Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log update info
        run: |
          echo "## 🤖 Dependabot PR Detected" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`${{ steps.meta.outputs.dependency-names }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Update type:** \`${{ steps.meta.outputs.update-type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**From:** \`${{ steps.meta.outputs.previous-version }}\` → **To:** \`${{ steps.meta.outputs.new-version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Approve PR (patch & minor updates)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review --approve "$PR_URL"
          echo "✅ PR approved (patch/minor update)" >> $GITHUB_STEP_SUMMARY
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (patch & minor updates)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr merge --auto --squash "$PR_URL"
          echo "🔀 Auto-merge enabled" >> $GITHUB_STEP_SUMMARY
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag major updates for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "⚠️ Major update detected — manual review required" >> $GITHUB_STEP_SUMMARY
          echo "Package: ${{ steps.meta.outputs.dependency-names }}"
          echo "This PR requires manual approval before merging."
