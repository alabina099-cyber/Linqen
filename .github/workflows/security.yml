name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Tous les lundis à 6h UTC (audit hebdomadaire)
    - cron: '0 6 * * 1'

jobs:
  npm-audit:
    name: NPM Vulnerabilities Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Run npm audit (full)
        run: npm audit --audit-level=critical
        continue-on-error: true

  static-analysis:
    name: Static Analysis (Trivy + Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy - Scan filesystem (secrets + vulnérabilités)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          scanners: vuln,secret,misconfig

      - name: Semgrep - Analyse statique de sécurité
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/react
            p/nodejs
            p/owasp-top-ten
        continue-on-error: true

  secrets-scan:
    name: Detect Leaked Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
