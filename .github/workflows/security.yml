name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Tous les lundis à 6h UTC (audit hebdomadaire)
    - cron: '0 6 * * 1'

jobs:
  npm-audit:
    name: NPM Vulnerabilities Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Run npm audit (full)
        run: npm audit --audit-level=critical

  custom-security-audit:
    name: Custom Security Audit (XSS, CORS, Rate Limit)
    runs-on: ubuntu-latest
    needs: npm-audit
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app for testing
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-dummy' }}
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Start app in background
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-dummy' }}
        run: |
          npm start &
          echo $! > app.pid
          sleep 10

      - name: Run custom security audit
        run: npm run security-audit
        continue-on-error: true

      - name: Stop app
        if: always()
        run: kill $(cat app.pid) || true

  codeql:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    # Temporaire : le repo n'a pas Code Scanning activé dans Settings > Security
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  secrets-scan:
    name: Detect Leaked Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
