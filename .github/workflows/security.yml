# run: final-verification-v3
name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Tous les lundis à 6h UTC (audit hebdomadaire)
    - cron: '0 6 * * 1'

jobs:
  npm-audit:
    name: NPM Vulnerabilities Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Run npm audit (full)
        run: npm audit --audit-level=critical
        continue-on-error: true

  static-analysis:
    name: Static Analysis (Trivy + Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy - Scan filesystem (secrets + vulnérabilités)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          scanners: vuln,secret,misconfig

      - name: Semgrep - Analyse statique de sécurité
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/react
            p/nodejs
            p/owasp-top-ten
        continue-on-error: true

  secrets-scan:
    name: Detect Leaked Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan working tree for secrets (mode audit)
        continue-on-error: true
        run: |
          gitleaks dir . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --verbose \
            --report-format sarif \
            --report-path gitleaks-results.sarif \
            --exit-code 0
          echo "## 🔐 Gitleaks Scan terminé (mode audit)" >> $GITHUB_STEP_SUMMARY
          if [ -s gitleaks-results.sarif ]; then
            echo "Rapport SARIF généré — voir l'artifact gitleaks-report." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Aucun secret détecté." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload résultats Gitleaks (si présents)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-results.sarif
          if-no-files-found: ignore

  application-security:
    name: Application Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-dummy' }}
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Start server in background
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-dummy' }}
        run: |
          nohup npm start > server.log 2>&1 &
          echo $! > server.pid
          sleep 10

      - name: Run application security audit
        env:
          BASE_URL: http://localhost:3000
        run: node scripts/security-audit.js
        continue-on-error: true

      - name: Stop background server
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) 2>/dev/null || true; fi
