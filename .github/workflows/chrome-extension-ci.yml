# run: final-verification
name: CI - Chrome Extension Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'linkedin-chrome-extension/**'
      - '.github/workflows/chrome-extension-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'linkedin-chrome-extension/**'

jobs:
  validate:
    name: Validate Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-chrome-extension
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manifest.json syntax
        run: |
          python3 -c "import json; json.load(open('manifest.json'))"
          echo "✅ manifest.json is valid JSON"

      - name: Check referenced files exist
        run: |
          errors=0
          for file in $(python3 -c "
          import json
          m = json.load(open('manifest.json'))
          files = []
          # Background service worker
          if 'background' in m and 'service_worker' in m['background']:
            files.append(m['background']['service_worker'])
          # Content scripts
          for cs in m.get('content_scripts', []):
            files.extend(cs.get('js', []))
            files.extend(cs.get('css', []))
          # Action popup
          if 'action' in m and 'default_popup' in m['action']:
            files.append(m['action']['default_popup'])
          # Icons
          for size, path in m.get('icons', {}).items():
            files.append(path)
          # Action default_icon
          if 'action' in m and 'default_icon' in m['action']:
            for size, path in m['action']['default_icon'].items():
              files.append(path)
          for f in files:
            print(f)
          "); do
            if [ ! -f "$file" ]; then
              echo "❌ Missing file: $file"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "✅ All referenced files exist"

      - name: Check Manifest V3 compliance
        run: |
          MV=$(python3 -c "import json; print(json.load(open('manifest.json'))['manifest_version'])")
          if [ "$MV" != "3" ]; then
            echo "❌ manifest_version must be 3 (got $MV)"
            exit 1
          fi
          echo "✅ Manifest V3 confirmed"

      - name: Setup Node.js for JS syntax check
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JavaScript syntax check
        run: |
          errors=0
          for file in background.js bridge.js content.js popup.js selectors.js; do
            if [ -f "$file" ]; then
              node --check "$file" && echo "✅ $file — OK" || { echo "❌ $file — syntax error"; errors=$((errors + 1)); }
            fi
          done
          if [ $errors -gt 0 ]; then exit 1; fi

  package:
    name: Package Extension (.zip)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])" \
            linkedin-chrome-extension/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $VERSION"

      - name: Create extension zip
        run: |
          cd linkedin-chrome-extension
          zip -r "../linkedin-agent-extension-v${{ steps.version.outputs.version }}.zip" \
            manifest.json \
            background.js bridge.js content.js popup.js popup.html selectors.js styles.css \
            icons/
          echo "✅ Extension packaged"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-v${{ steps.version.outputs.version }}
          path: linkedin-agent-extension-v${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Packaging summary
        run: |
          echo "## 📦 Chrome Extension Packaged" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** \`chrome-extension-v${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** 30 days" >> $GITHUB_STEP_SUMMARY
