# run: final-verification-v3
name: Database Backup (Cron)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/backup.yml'
  schedule:
    # Tous les jours à 2h UTC (3h Paris l'hiver, 4h l'été)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Permet de lancer un backup manuel

jobs:
  backup:
    name: Backup PostgreSQL Database
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: linkedin-agent-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json

      - name: Install pg dependency
        run: npm ci --omit=dev

      - name: Verify DATABASE_URL secret
        id: verify
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "has_db_url=false" >> $GITHUB_OUTPUT
            echo "⚠️ DATABASE_URL secret not configured — backup steps will be skipped."
          else
            echo "has_db_url=true" >> $GITHUB_OUTPUT
            echo "✅ DATABASE_URL secret configured."
          fi

      - name: Run backup script
        if: steps.verify.outputs.has_db_url == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_RETENTION_DAYS: '30'
        run: npm run backup

      - name: Get backup folder name
        id: backup-info
        if: steps.verify.outputs.has_db_url == 'true'
        run: |
          BACKUP_DIR=$(ls -td backups/backup-* | head -1)
          echo "path=$BACKUP_DIR" >> $GITHUB_OUTPUT
          echo "name=$(basename $BACKUP_DIR)" >> $GITHUB_OUTPUT

      - name: Upload backup as artifact (fallback)
        if: steps.verify.outputs.has_db_url == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.backup-info.outputs.name }}
          path: linkedin-agent-frontend/${{ steps.backup-info.outputs.path }}
          retention-days: 30

      - name: Compress backup
        if: steps.verify.outputs.has_db_url == 'true'
        working-directory: linkedin-agent-frontend
        run: |
          cd "${{ steps.backup-info.outputs.path }}"
          tar -czf "../${{ steps.backup-info.outputs.name }}.tar.gz" .
          ls -lh "../${{ steps.backup-info.outputs.name }}.tar.gz"

      - name: Encrypt backup (GPG symmetric AES256)
        id: encrypt
        if: steps.verify.outputs.has_db_url == 'true'
        working-directory: linkedin-agent-frontend
        env:
          PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          FILE="${{ steps.backup-info.outputs.name }}.tar.gz"
          if [ -z "$PASSPHRASE" ]; then
            echo "⚠️ BACKUP_ENCRYPTION_PASSPHRASE absent — backup R2 sera EN CLAIR (fortement déconseillé)"
            echo "upload_name=$FILE" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --cipher-algo AES256 --symmetric --output "$FILE.gpg" "$FILE"
          # Vérifier le déchiffrement (round-trip) avant d'écraser/d'uploader
          echo "$PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --decrypt "$FILE.gpg" > /tmp/verify.tar.gz
          if ! cmp -s "$FILE" /tmp/verify.tar.gz; then
            echo "❌ Vérification déchiffrement échouée"
            exit 1
          fi
          rm /tmp/verify.tar.gz
          rm "$FILE"
          echo "✅ Backup chiffré (round-trip OK) : $FILE.gpg"
          echo "upload_name=$FILE.gpg" >> $GITHUB_OUTPUT

      - name: Upload backup to Cloudflare R2 (S3-compatible)
        if: steps.verify.outputs.has_db_url == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        working-directory: linkedin-agent-frontend
        run: |
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_ENDPOINT" ] || [ -z "$R2_BUCKET" ]; then
            echo "⚠️ R2 non configuré — backup conservé uniquement en artifact GitHub (30j)"
            echo "ℹ️  Pour activer R2: configurer R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ENDPOINT / R2_BUCKET"
            exit 0
          fi
          # Installer rclone (S3-compatible, gratuit)
          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = $R2_ENDPOINT
          region = auto
          EOF
          FILE="${{ steps.encrypt.outputs.upload_name }}"
          rclone copy "$FILE" "r2:$R2_BUCKET/db-backups/" --progress
          echo "✅ Backup uploadé vers R2: $R2_BUCKET/db-backups/$FILE"
          echo "## ☁️ Backup R2" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** \`$R2_BUCKET/db-backups/$FILE\`" >> $GITHUB_STEP_SUMMARY

          # Rétention : supprimer les backups > 90 jours dans R2 (tar.gz et tar.gz.gpg)
          rclone delete "r2:$R2_BUCKET/db-backups/" --min-age 90d --include "backup-*.tar.gz*" || true

      - name: Backup summary
        run: |
          if [ "${{ steps.verify.outputs.has_db_url }}" == "true" ]; then
            echo "## ✅ Database Backup Completed" >> $GITHUB_STEP_SUMMARY
            echo "**Backup name:** \`${{ steps.backup-info.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Retention:** 30 days (artifact)" >> $GITHUB_STEP_SUMMARY
            if [ -f "${{ steps.backup-info.outputs.path }}/_manifest.json" ]; then
              echo "### Manifest" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              cat "${{ steps.backup-info.outputs.path }}/_manifest.json" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## ⏭️ Database Backup Skipped" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️  **Reason:** `DATABASE_URL` secret is not configured in repository settings." >> $GITHUB_STEP_SUMMARY
            echo "ℹ️  To enable real backups, add `DATABASE_URL` to **Settings → Secrets and variables → Actions**." >> $GITHUB_STEP_SUMMARY
          fi

  final-verification:
    name: Final Verification
    runs-on: ubuntu-latest
    needs: [backup]
    steps:
      - name: Verify backup completed
        run: |
          echo "## ✅ Final Verification — Backup workflow completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **PostgreSQL Backup:** ✅" >> $GITHUB_STEP_SUMMARY
