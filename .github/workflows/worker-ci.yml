# run: final-verification-v3
name: CI - Worker Build & Lint

on:
  push:
    branches: [main, develop]
    paths:
      - 'linkedin-agent-worker/**'
      - '.github/workflows/worker-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'linkedin-agent-worker/**'

jobs:
  build:
    name: Build Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin-agent-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: TypeScript compile
        run: npm run build

  final-verification:
    name: Final Verification
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Verify worker build passed
        run: |
          echo "## ✅ Final Verification — Worker CI completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Worker:** ✅" >> $GITHUB_STEP_SUMMARY
