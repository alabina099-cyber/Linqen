name: Deploy Staging (develop branch)

# Pipeline staging déclenché à chaque push sur develop.
# Cible un 2e environnement Coolify séparé de la prod.

on:
  push:
    branches: [develop]
    paths:
      - 'linkedin-agent-frontend/**'
      - 'linkedin-agent-worker/**'
      - 'Dockerfile'
      - 'db/migrations/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push staging image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-sha-
            type=raw,value=staging,enable={{is_default_branch}}
            type=raw,value=staging

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate-staging-db:
    name: Apply migrations on staging DB
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: linkedin-agent-frontend/package-lock.json
      - name: Install pg
        working-directory: linkedin-agent-frontend
        run: npm ci --omit=dev --ignore-scripts
      - name: Migrate
        working-directory: linkedin-agent-frontend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ STAGING_DATABASE_URL non défini — skip"
            exit 0
          fi
          npm run migrate

  deploy-staging:
    name: Deploy to Coolify (staging)
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate-staging-db]
    steps:
      - name: Trigger Coolify staging webhook
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_STAGING_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "⚠️ COOLIFY_STAGING_WEBHOOK_URL non configuré"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
          echo "✅ Staging deploy triggered"

      - name: Wait & smoke test
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          if [ -z "$STAGING_URL" ]; then
            echo "⚠️ STAGING_URL non défini — skip smoke test"
            exit 0
          fi
          sleep 60
          for i in $(seq 1 8); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$STAGING_URL/api/health" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "✅ Staging health OK"
              echo "## ✅ Staging deployed" >> $GITHUB_STEP_SUMMARY
              echo "URL: $STAGING_URL" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "⏳ HTTP $CODE — retry"
            sleep 20
          done
          echo "❌ Staging smoke test failed"
          exit 1

  final-verification:
    name: Final Verification
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate-staging-db, deploy-staging]
    steps:
      - name: Verify staging deployment passed
        run: |
          echo "## ✅ Final Verification — Staging deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Build & Push:** ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **DB Migrations:** ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Staging:** ✅" >> $GITHUB_STEP_SUMMARY
