# =============================================
# Nginx Load Balancer Configuration
# Distribue le trafic entre plusieurs instances Next.js
# =============================================

worker_processes auto;
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript;

    # Rate limiting — 100 requêtes/seconde par IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

    # Load balancing upstream — least_conn distribue vers l'instance la moins occupée
    upstream nextjs_backend {
        least_conn;
        # Docker Compose résout automatiquement "app" vers toutes les instances scalées
        server app:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Cache pour les assets statiques
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # =============================================
    # SSL/TLS — Configuration moderne (Mozilla "Intermediate" 2024)
    # =============================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # =============================================
    # Server HTTP (port 80) — redirect 301 vers HTTPS
    # Sauf /health (utilisé par les load balancers internes Docker)
    # =============================================
    server {
        listen 80;
        server_name _;

        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Permet le challenge ACME (Let's Encrypt / Certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Tout le reste → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================
    # Server HTTPS (port 443) — TLS 1.2/1.3
    # =============================================
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Certificats : montés depuis Coolify/Certbot ou Cloudflare Origin
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Security headers (defense-in-depth, redondant avec middleware Next.js)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        client_max_body_size 10M;

        # Health check de Nginx lui-même
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Routes API — rate limiting plus strict
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://nextjs_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Assets statiques — avec cache
        location /_next/static/ {
            proxy_cache static_cache;
            proxy_cache_valid 200 60m;
            proxy_cache_use_stale error timeout invalid_header updating;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass http://nextjs_backend;
        }

        # Toutes les autres requêtes
        location / {
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://nextjs_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
